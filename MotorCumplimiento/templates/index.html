<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor de Cumplimiento Normativo - Unisierra</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .header {
            display: flex;
            align-items: center;
            border-bottom: 2px solid #ff9800;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .logo {
            width: 70px;
            height: 70px;
            margin-right: 20px;
            background-color: #ff9800; /* Reemplazar visualmente si no carga la imagen */
            border-radius: 8px;
        }
        .header-text h1 {
            margin: 0;
            font-size: 26px;
            color: #ffffff;
        }
        .header-text h2 {
            margin: 5px 0 0 0;
            font-size: 14px;
            color: #ff9800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        label {
            display: block;
            margin-bottom: 12px;
            font-size: 16px;
            color: #ccc;
        }
        textarea {
            width: 100%;
            height: 200px;
            background-color: #2d2d2d;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            padding: 15px;
            font-size: 15px;
            box-sizing: border-box;
            resize: vertical;
        }
        textarea:focus {
            border-color: #ff9800;
            outline: none;
        }
        .btn-analizar {
            width: 100%;
            background-color: #1e7e34;
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.2s;
            text-transform: uppercase;
        }
        .btn-analizar:hover {
            background-color: #218838;
        }
        /* Estilos del cuadro de aprobación */
        .resultado-verde {
            border: 2px solid #28a745;
            background-color: rgba(40, 167, 69, 0.15);
            padding: 20px;
            border-radius: 8px;
            margin-top: 25px;
            display: flex;
            align-items: center;
            font-size: 16px;
        }
        .resultado-verde .icono {
            font-size: 24px;
            margin-right: 15px;
            color: #28a745;
        }
        /* Estilos del cuadro de error/observaciones */
        .resultado-naranja {
            border: 2px solid #ff9800;
            background-color: #1a1a1a;
            padding: 25px;
            border-radius: 8px;
            margin-top: 25px;
        }
        .resultado-naranja h3 {
            color: #ff9800;
            margin-top: 0;
            font-size: 18px;
            display: flex;
            align-items: center;
        }
        .resultado-naranja table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 14px;
        }
        .resultado-naranja th {
            color: #888;
            border-bottom: 2px solid #ff9800;
            padding: 10px;
            text-align: left;
        }
        .resultado-naranja td {
            padding: 12px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            vertical-align: top;
        }
        .badge-codigo {
            background-color: #2d2d2d;
            color: #ffc107;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
            border: 1px solid rgba(255,193,7,0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img class="logo" src="/static/logo_unisierra.png" alt="Unisierra" onerror="this.style.display='none'">
        <div class="header-text">
            <h1>Motor de Cumplimiento Normativo</h1>
            <h2>División de Ingeniería y Tecnologías — Universidad de la Sierra</h2>
        </div>
    </div>

    <label for="textarea_texto">Inserta los capítulos o apartados de la Memoria de Estadía:</label>
    <textarea id="textarea_texto" placeholder="Pega tu texto formal o de prueba aquí..."></textarea>
    
    <button class="btn-analizar" onclick="iniciarAnalisisFormal()">Iniciar Análisis Formal</button>

    <div id="contenedor_resultado"></div>
</div>

<script>
function iniciarAnalisisFormal() {
    const textoUsuario = document.getElementById("textarea_texto").value;
    const contenedorResultado = document.getElementById("contenedor_resultado");
    
    if (!textoUsuario.trim()) {
        alert("Por favor, ingresa un fragmento de texto para poder auditarlo.");
        return;
    }

    // Dibujamos un estado visual de carga para dar realismo profesional
    contenedorResultado.innerHTML = `<p style="color: #ff9800; font-weight: bold; margin-top: 20px;">Procesando heurística y auditoría institucional...</p>`;

    fetch('/evaluar', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ texto: textoUsuario })
    })
    .then(response => response.json())
    .then(data => {
        // Limpieza forzada total: destruye todo lo que estaba pintado antes
        contenedorResultado.innerHTML = "";

        if (data.cumple_todo === true) {
            // 🟢 PINTAR DICTAMEN APROBADO
            contenedorResultado.innerHTML = `
                <div class="resultado-verde">
                    <div class="icono">✔</div>
                    <div><strong>Dictamen Aprueba:</strong> El fragmento evaluado se alinea perfectamente con los criterios de la guía.</div>
                </div>
            `;
        } else {
            // 🟠 PINTAR TABLA DE OBSERVACIONES
            let filas = "";
            data.incumplimientos.forEach(inc => {
                filas += `
                    <tr>
                        <td><span class="badge-codigo">${inc.id_regla}</span></td>
                        <td style="color: #fff;">${inc.motivo}</td>
                        <td style="color: #ffb03b;">👉 ${inc.sugerencia}</td>
                    </tr>
                `;
            });

            contenedorResultado.innerHTML = `
                <div class="resultado-naranja">
                    <h3>⚠ Dictamen con Observaciones: <span style="color:#fff; margin-left: 10px; font-weight: normal; font-size: 15px;">Se identificaron desviaciones que requieren corrección inmediata</span></h3>
                    <table>
                        <thead>
                            <tr>
                                <th style="width: 20%;">CÓDIGO</th>
                                <th style="width: 45%;">HALLAZGO / MOTIVO</th>
                                <th style="width: 35%;">ACCIÓN SUGERIDA</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${filas}
                        </tbody>
                    </table>
                </div>
            `;
        }
    })
    .catch(error => {
        console.error("Error detectado en el proceso de evaluación:", error);
        contenedorResultado.innerHTML = `<p style="color: #dc3545; margin-top: 20px;">Error crítico al conectar con el servidor de evaluación.</p>`;
    });
}
</script>

</body>
</html>
